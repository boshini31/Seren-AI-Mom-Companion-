version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: serenai-postgres
    environment:
      POSTGRES_DB: serenai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serenai-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/serenai
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: serenai-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
